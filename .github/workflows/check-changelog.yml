name: Check Changelog

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  label-changelog:
    name: Label Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    outputs:
      skip: ${{ steps.check.outputs.skip }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: yarn
      - name: install
        run: yarn --immutable
      - name: Check for relevant changes and update label
        id: check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const {default: run} = await import('${{ github.workspace }}/scripts/labelChangelog.mjs')
            await run({github, context, core})

  check-changelog:
    name: Check Changelog Entry
    runs-on: ubuntu-latest
    needs: label-changelog

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: yarn
      - name: install
        run: yarn --immutable
      - name: check changelog
        if: needs.label-changelog.outputs.skip == 'true'
        run: yarn check-changelog
      - name: check changelog entry
        if: needs.label-changelog.outputs.skip != 'true'
        run: yarn check-changelog ${{ github.event.pull_request.number }}
